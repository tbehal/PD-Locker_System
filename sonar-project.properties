# SonarQube Project Properties
sonar.projectKey=schedulingapp
sonar.projectName=Smart Lab Availability Manager
sonar.projectVersion=1.0.0

# Source code paths - only include source files
sonar.sources=frontend/src,backend/src

# Language and framework
sonar.language=js
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Exclude patterns
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/*.min.js,**/coverage/**

# Include patterns for JavaScript files
sonar.inclusions=**/*.js,**/*.jsx,**/*.ts,**/*.tsx

# Encoding
sonar.sourceEncoding=UTF-8

# Coverage settings
sonar.coverage.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/coverage/**,**/*.test.js,**/*.spec.js

# Duplicate code detection
sonar.cpd.js.minimumTokens=100
